version: '3'

tasks:
  build:
    desc: Build the Go application
    cmds:
      - go build -o bin/server ./cmd/server

  clean:
    desc: Remove binary
    cmds:
      - rm -f bin/server

  run:
    desc: Run the Go application
    cmds:
      - go run ./cmd/server

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - gofmt -w -s .
      - goimports -w .

  tidy:
    desc: tidy go.mod
    cmds:
      - go mod tidy

  tidy-gci-install:
    desc: Install golangci-lint and goimports
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install golang.org/x/tools/cmd/goimports@latest
version: '3.8'

services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  nlp-service:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: telemetryai
      POSTGRES_PASSWORD: telemetryai
      POSTGRES_DB: telemetryai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetryai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=telemetryai
      - DATABASE_PASSWORD=telemetryai
      - DATABASE_DBNAME=telemetryai
      - NLP_SERVICE_URL=http://nlp-service:5000
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      nlp-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    depends_on:
      - nats
      - backend
      - mailhog

volumes:
  postgres_data:
version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: telemetryai
      POSTGRES_PASSWORD: telemetryai
      POSTGRES_DB: telemetryai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetryai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=telemetryai
      - DATABASE_PASSWORD=telemetryai
      - DATABASE_DBNAME=telemetryai
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
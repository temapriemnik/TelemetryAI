services:
  telemetry-dev:
    image: golang:1.26-alpine
    container_name: telemetry_service_dev
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      KAFKA_BROKERS: host.docker.internal:9092
      KAFKA_GROUP: telemetry-service
      KAFKA_TOPIC: raw.logs
      METRICS_PORT: "8080"
      GRPC_PORT: "50051"
      BADGER_PATH: /data/apikeys
    volumes:
      - ./telemetry-service:/app
      - badger_data:/data/apikeys
    command: >
      sh -c "apk add --no-cache git &&
             go install github.com/cosmtrek/air@latest &&
             air"
services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetry
      PGTZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10
    container_name: nats_server
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    command:
      - "--jetstream"
    environment:
      JWT: ""
      DEBUG: "false"
      TRACE: "false"

  telemetry:
    build:
      context: ./telemetry-service
      dockerfile: Dockerfile
    container_name: telemetry_service
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: raw.logs
      METRICS_PORT: "8080"
      GRPC_PORT: "50051"
      BADGER_PATH: /data/apikeys
    volumes:
      - badger_data:/data/apikeys
    depends_on:
      - nats

  identity:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: identity_service
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "50052:50052"
    environment:
      DB_HOST: identity_db
      DB_PORT: 5432
      DB_USER: identity
      DB_PASSWORD: identity
      DB_NAME: identity
      HTTP_PORT: "8081"
      GRPC_PORT: "50052"
    depends_on:
      - nats
      - identity_db

  identity_db:
    image: postgres:16-alpine
    container_name: identity_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity
      POSTGRES_DB: identity
    ports:
      - "5433:5432"
    volumes:
      - identity_pgdata:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
      - "80:80"
    depends_on:
      - identity

volumes:
  pgdata:
  badger_data:
  identity_pgdata: